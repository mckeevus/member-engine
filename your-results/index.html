    root.querySelector('#confirm-oneliner').textContent = bannerOneLiners[primary] || '';

    // --- SCORE ---
    root.querySelector('#total-score').textContent = total;

    var badge = root.querySelector('#severity-badge');
    badge.textContent = severity;
    badge.style.background = severityBg;
    badge.style.color = severityColor;

    root.querySelector('#severity-desc').textContent = severityDesc;

    if (email) {
      root.querySelector('#email-display').textContent = email;
    } else {
      root.querySelector('#score-email-line').style.display = 'none';
    }

    // --- MODULE BARS ---
    var html = '';
    moduleOrder.forEach(function(mod) {
      var score     = moduleScores[mod];
      var pct       = Math.round(score / 24 * 100);
      var isPrimary = (mod === primary);
      var barColor  = score <= 8 ? '#DC2626' : score <= 16 ? '#D97706' : '#047857';
      html += '<div class="module-row' + (isPrimary ? ' is-primary' : '') + '">';
      html +=   '<div class="module-row-top">';
      html +=     '<span class="module-name">' + moduleLabels[mod];
      if (isPrimary) html += ' <span class="primary-badge">Primary leak</span>';
      html +=     '</span>';
      html +=     '<span class="module-score">' + score + '<span class="module-denom">/24</span></span>';
      html +=   '</div>';
      html +=   '<div class="module-track"><div class="module-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>';
      html += '</div>';
    });
    root.querySelector('#modules-list').innerHTML = html;

    // --- PRIMARY LEAK CARD ---
    var leak = primaryCopy[primary] || primaryCopy['detection'];
    root.querySelector('#leak-module-name').textContent = moduleLabels[primary] || primary;
    root.querySelector('#leak-score-val').textContent   = moduleScores[primary];
    root.querySelector('#leak-headline').textContent    = leak.headline;
    root.querySelector('#leak-body').textContent        = leak.body;
    root.querySelector('#leak-fix').textContent         = leak.fix;

    // --- PITCH SECTION ---
    var modName = moduleLabels[primary] || primary;
    var sec2    = moduleLabels[secondary] || secondary;
    var sec3    = moduleLabels[tertiary]  || tertiary;

    root.querySelector('#pitch-headline').textContent    = pitchHeadlines[primary]    || '';
    root.querySelector('#pitch-subheadline').textContent = pitchSubheadlines[primary] || '';
    root.querySelector('#pitch-module-name').textContent = modName;
    root.querySelector('#offer-card-title').textContent  = modName + ' Implementation Plan';

    root.querySelector('#offer-bullet-1').innerHTML =
      'The mechanism behind your <strong>' + modName + '</strong> leak \u2014 and why the most common response to it usually makes it worse';
    root.querySelector('#offer-bullet-2').innerHTML =
      'The exact steps we use to address it \u2014 the same framework we bring to businesses we work with directly';
    root.querySelector('#offer-bullet-3').textContent =
      'The one thing to do first (this week, not someday)';
    root.querySelector('#offer-bullet-4').innerHTML =
      'The scripts, templates, or frameworks that <strong>' + modName + '</strong> requires \u2014 so you\u2019re not building from scratch';
    root.querySelector('#offer-bullet-5').innerHTML =
      'A clear look at your two secondary leaks (<strong>' + sec2 + '</strong> and <strong>' + sec3 + '</strong>) \u2014 what they mean and where the full fix lives';

    root.querySelector('#cta-btn').textContent = ctaButtonText[primary] || ('Get my ' + modName + ' fix plan for $27 \u2192');
  }

})();
</script>
