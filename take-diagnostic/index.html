  customElements.define('me-diagnostic', MeDiagnostic);

  function initDiagnostic(root) {

    var modules     = ['activation','habit','connection','communication','detection','ascension'];
    var scores      = { activation:0, habit:0, connection:0, communication:0, detection:0, ascension:0 };
    var answers     = {};
    var currentQ    = 1;
    var totalQ      = 36;
    var cpSeen      = {};   // tracks which checkpoints have been shown

    // Phase labels
    var phaseLabels = {
      activation:    'Phase 1: Activation',
      habit:         'Phase 2: Habit Formation',
      connection:    'Phase 3: Connection',
      communication: 'Phase 4: Communication',
      detection:     'Phase 5: Detection',
      ascension:     'Phase 6: Ascension'
    };

    // Checkpoint config: keyed by the question number that should show AFTER the checkpoint
    var checkpoints = {
      7:  { mod: 'activation',    eyebrow: 'MODULE 1 COMPLETE',           milestone: '' },
      13: { mod: 'habit',         eyebrow: 'MODULE 2 COMPLETE',           milestone: '' },
      19: { mod: 'connection',    eyebrow: 'HALFWAY POINT — MODULE 3 COMPLETE', milestone: 'Halfway point' },
      25: { mod: 'communication', eyebrow: 'MODULE 4 COMPLETE',           milestone: '' },
      31: { mod: 'detection',     eyebrow: 'FINAL SECTION AHEAD',         milestone: 'Final section' }
    };

    var checkpointCopy = {
      activation: {
        identityLow:  'The Leaky Onboarding System',
        messageLow:   'Your Activation score is trending lower than average. This is where most memberships lose members before those members have even made a decision \u2014 not a dramatic exit, just a slow drift that compounds quietly. Let\u2019s keep going.',
        messageHigh:  'Your Activation layer is tracking above average. The first 30 days are in better shape than most memberships we see. Let\u2019s see if that holds through the next sections.'
      },
      habit: {
        identityLow:  'The Silent Churn Engine',
        messageLow:   'Habit Formation is flagging. Members are getting past the initial excitement \u2014 but the return loop isn\u2019t strong enough to keep pulling them back. This is the most common mid-stage leak, and it\u2019s almost always fixable.',
        messageHigh:  'Habit Formation is tracking well. Members are building the routine. Let\u2019s look at the community layer next.'
      },
      connection: {
        identityLow:  'The Isolated Subscriber Problem',
        messageLow:   'Three modules in. Connection is showing a gap \u2014 members are consuming without connecting. The cost of leaving is lower than it should be. At this point we can usually tell whether a retention problem is fixable or structural. Keep going.',
        messageHigh:  'Three modules in. You\u2019re tracking above average across activation, habit, and connection. The second half tests where most operators have their biggest blind spots.'
      },
      communication: {
        identityLow:  'The Broadcast Problem',
        messageLow:   'Communication is flagging. The right message isn\u2019t reaching the right members at the right time. Most operators don\u2019t see this until engagement has already declined \u2014 and by then the habit is broken.',
        messageHigh:  'Communication is tracking well. The final two sections \u2014 Detection and Ascension \u2014 are where most memberships have their biggest surprises.'
      },
      detection: {
        identityLow:  'The Blind Spot',
        messageLow:   'One module left. Your Detection score tells us something important: you\u2019re likely finding out members are at risk after they\u2019ve already decided to leave. The final section will show whether that\u2019s compounding.',
        messageHigh:  'One module left: Ascension. Detection is in solid shape \u2014 you have better visibility than most. Let\u2019s see if you have a clear path for your best members, or if they\u2019re graduating themselves out.'
      }
    };

    // Email — URL param first, sessionStorage fallback
    var urlParams = new URLSearchParams(window.location.search);
    var userEmail = urlParams.get('email') || '';
    if (!userEmail) {
      try { userEmail = sessionStorage.getItem('me_email') || ''; } catch(e) {}
    }

    var cards           = root.querySelectorAll('.question-card');
    var progressFill    = root.querySelector('#progress-fill');
    var progressCurrent = root.querySelector('#progress-current');
    var progressModule  = root.querySelector('#progress-module');
    var quizArea        = root.querySelector('#quiz-area');
    var introScreen     = root.querySelector('#intro-screen');
    var checkpointScreen = root.querySelector('#checkpoint-screen');

    // --- INTRO SCREEN ---
    root.querySelector('#btn-start').addEventListener('click', function() {
      introScreen.style.display = 'none';
      quizArea.style.display = 'block';
      showCard(1);
    });

    // --- CHECKPOINT ---
    function showCheckpoint(nextQ) {
      var cp   = checkpoints[nextQ];
      var mod  = cp.mod;
      var copy = checkpointCopy[mod];
      var sc   = scores[mod];
      var isLow = sc <= 12;

      root.querySelector('#cp-eyebrow').textContent  = cp.eyebrow;
      root.querySelector('#cp-module-label').textContent = phaseLabels[mod];
      root.querySelector('#cp-score-display').textContent = 'Score so far: ' + sc + '/24';

      var identityEl = root.querySelector('#cp-identity');
      if (isLow) {
        identityEl.textContent     = copy.identityLow;
        identityEl.style.display   = 'inline-block';
      } else {
        identityEl.style.display   = 'none';
      }

      root.querySelector('#cp-message').textContent = isLow ? copy.messageLow : copy.messageHigh;

      // progress bar state
      progressCurrent.textContent = cp.milestone ? cp.milestone : ('After module ' + (nextQ / 6 - 1));
      progressFill.style.width    = (((nextQ - 1) / totalQ) * 100) + '%';

      quizArea.style.display = 'none';
      checkpointScreen.style.display = 'block';

      var continueBtn = root.querySelector('#btn-continue');
      var newBtn = continueBtn.cloneNode(true); // remove old listeners
      continueBtn.parentNode.replaceChild(newBtn, continueBtn);
      newBtn.addEventListener('click', function() {
        checkpointScreen.style.display = 'none';
        quizArea.style.display         = 'block';
        cpSeen[nextQ] = true;
        showCard(nextQ);
      });
    }

    // --- SHOW CARD ---
    function showCard(n) {
      // Insert checkpoint before the first question of a new module (except ascension — show at end)
      if (checkpoints[n] && !cpSeen[n]) {
        showCheckpoint(n);
        return;
      }

      cards.forEach(function(c) { c.classList.remove('active'); });
      var card = root.querySelector('[data-q="' + n + '"]');
      if (!card) return;
      card.classList.add('active');

      var mod = card.dataset.module;
      var phaseLabel = phaseLabels[mod] || card.dataset.moduleLabel;
      if (n === 19) phaseLabel = 'Phase 4: Communication \u00b7 Halfway';
      if (n === 31) phaseLabel = 'Phase 6: Ascension \u00b7 Final section';

      progressCurrent.textContent = 'Question ' + n + ' of ' + totalQ;
      progressModule.textContent  = phaseLabel;
      progressFill.style.width    = ((n - 1) / totalQ * 100) + '%';

      if (answers[n] !== undefined) {
        var opts = card.querySelectorAll('.option');
        opts.forEach(function(o) {
          o.classList.remove('selected');
          if (parseInt(o.dataset.score) === answers[n]) o.classList.add('selected');
        });
        card.querySelector('.btn-next').classList.add('ready');
      }
    }

    function initCard(card) {
      var opts    = card.querySelectorAll('.option');
      var btnNext = card.querySelector('.btn-next');
      var btnBack = card.querySelector('.btn-back');
      var qNum    = parseInt(card.dataset.q);
      var mod     = card.dataset.module;

      opts.forEach(function(opt) {
        opt.addEventListener('click', function() {
          opts.forEach(function(o) { o.classList.remove('selected'); });
          opt.classList.add('selected');
          answers[qNum] = parseInt(opt.dataset.score);
          recalcModuleScore(mod);
          btnNext.classList.add('ready');
        });
      });

      btnNext.addEventListener('click', function() {
        if (!btnNext.classList.contains('ready')) return;
        if (qNum < totalQ) {
          currentQ = qNum + 1;
          showCard(currentQ);
        } else {
          showDirectResults();
        }
      });

      if (btnBack) {
        btnBack.addEventListener('click', function() {
          if (qNum > 1) {
            currentQ = qNum - 1;
            // If we'd be going back to just after a checkpoint, skip past it
            showCard(currentQ);
          }
        });
      }
    }

    function recalcModuleScore(mod) {
      var total = 0;
      root.querySelectorAll('[data-module="' + mod + '"]').forEach(function(card) {
        var n = parseInt(card.dataset.q);
        if (answers[n] !== undefined) total += answers[n];
      });
      scores[mod] = total;
    }

    function showDirectResults() {
      root.querySelector('#questions-container').style.display = 'none';
      root.querySelector('#progress-wrap').style.display       = 'none';
      root.querySelector('#submitting-state').style.display    = 'block';

      var total    = 0;
      modules.forEach(function(m) { total += scores[m]; });
      var primary  = modules.reduce(function(a, b) { return scores[a] <= scores[b] ? a : b; });
      var severity = total > 114 ? 'Healthy' : total > 84 ? 'Developing' : total > 48 ? 'At Risk' : 'Critical';

      if (typeof window.fbq !== 'undefined') {
        window.fbq('trackCustom', 'DiagnosticComplete', { score_total: total, primary_leak: primary, severity: severity });
      }

      fetch('https://member-engine.vercel.app/api/submit-free', {
        method: 'POST',
        keepalive: true,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:               userEmail || null,
          score_activation:    scores.activation,
          score_habit:         scores.habit,
          score_connection:    scores.connection,
          score_communication: scores.communication,
          score_detection:     scores.detection,
          score_ascension:     scores.ascension,
          score_total:         total,
          primary_leak:        primary,
          severity:            severity,
          referrer:            document.referrer || null,
          user_agent:          navigator.userAgent || null
        })
      }).catch(function() {});

      var resultParams = new URLSearchParams({
        email: userEmail,
        total: total,
        primary: primary,
        a:  scores.activation,
        h:  scores.habit,
        cn: scores.connection,
        cm: scores.communication,
        d:  scores.detection,
        as: scores.ascension
      });
      setTimeout(function() {
        window.location.href = 'https://memberengine.co/your-results?' + resultParams.toString();
      }, 800);
    }

    cards.forEach(initCard);
    // Don't call showCard(1) on init — wait for intro screen button
  }

})();
</script>
